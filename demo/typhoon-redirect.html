<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>正在跳轉</title>
  <meta
    http-equiv="refresh"
    content="0; url=https://script.google.com/macros/s/PASTE_DEPLOYMENT_ID/exec?page=typhoon"
  />
  <style>
    :root {
      --bg: #f6f8f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #667085;
      --accent: #1f7a55;
      --accent-hover: #166040;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(31, 122, 85, 0.12), transparent 35%),
        linear-gradient(180deg, #f9fbfa 0%, var(--bg) 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid rgba(31, 122, 85, 0.12);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 14px 40px rgba(16, 24, 40, 0.08);
      text-align: center;
    }
    .spinner {
      width: 52px;
      height: 52px;
      margin: 0 auto 18px;
      border-radius: 50%;
      border: 5px solid rgba(31, 122, 85, 0.14);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.35;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    a {
      display: inline-block;
      margin-top: 18px;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
    }
    a:hover,
    a:focus-visible {
      background: var(--accent-hover);
      outline: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="spinner" aria-hidden="true"></div>
    <h1>正在前往颱風巡檢</h1>
    <p>如果沒有自動跳轉，請按下方按鈕手動開啟。</p>
    <a href="https://script.google.com/macros/s/PASTE_DEPLOYMENT_ID/exec?page=typhoon">開啟颱風巡檢</a>
  </main>
  <script>
    window.location.replace('https://script.google.com/macros/s/PASTE_DEPLOYMENT_ID/exec?page=typhoon');
  </script>
</body>
</html>
