<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>入口</title>
  <style>
    :root {
      --btn-bg: #1e90ff;
      --btn-bg-hover: #187bd6;
      --btn-text: #fff;
      --bg: #f7f7f8;
      --btn-alt: #1f7a55;
      --btn-alt-hover: #166040;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }
    a.button,
    button.button {
      display: inline-block;
      padding: 16px 28px;
      min-width: 220px;
      text-align: center;
      text-decoration: none;
      color: var(--btn-text);
      background: var(--btn-bg);
      border: 0;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,.12);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: .02em;
      transition: transform .05s ease, box-shadow .2s ease, background .2s ease;
      cursor: pointer;
    }
    a.button:active,
    button.button:active { transform: scale(.98); }
    a.button:hover,
    a.button:focus-visible,
    button.button:hover,
    button.button:focus-visible {
      background: var(--btn-bg-hover);
      outline: none;
      box-shadow: 0 8px 20px rgba(0,0,0,.16);
    }
    button.button.typhoon {
      background: var(--btn-alt);
    }
    button.button.typhoon:hover,
    button.button.typhoon:focus-visible {
      background: var(--btn-alt-hover);
    }
  </style>
</head>
<body>
  <a class="button" href="shift-handover.html" aria-label="交接巡檢">交接巡檢</a>
  <a class="button" href="schedule.html" aria-label="班表">班表</a>
  <a class="button" href="equipment.html" aria-label="設備操作">設備操作</a>
  <button
    class="button typhoon"
    type="button"
    aria-label="颱風巡檢"
    data-target="巴威颱風巡檢.html"
    onclick="openIfExists(this.dataset.target)"
  >
    颱風巡檢
  </button>

  <script>
    async function openIfExists(targetUrl) {
      try {
        const response = await fetch(targetUrl, {
          method: 'GET',
          cache: 'no-store'
        });

        if (response.ok) {
          window.location.href = targetUrl;
          return;
        }
      } catch (error) {
        console.warn('Page check failed:', error);
      }

      alert('尚未找到對應的巡檢頁面，暫時無法進入。');
    }
  </script>
</body>
</html>
