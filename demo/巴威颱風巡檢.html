<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>防颱措施檢查表｜手機版</title>
<style>
:root{--green:#1f7a55;--green-dark:#166040;--green2:#e9f7f0;--line:#d7e3dc;--text:#1d1d1f;--muted:#667085;--card:#fff;--bg:#f6f8f7;--red:#d92d20;--red-bg:#fff1f0}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--text);font-size:18px;line-height:1.6}.wrap{width:100%;max-width:430px;margin:0 auto;padding-bottom:120px}header{background:linear-gradient(135deg,#1f7a55,#2f9e70);color:#fff;padding:18px 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.12)}h1{font-size:22px;line-height:1.35;margin:0 0 10px;font-weight:850}.meta{display:grid;gap:9px;font-size:17px}.field{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);border-radius:12px;padding:8px 10px}input[type=text],input[type=date]{width:100%;font-size:18px;border:0;border-radius:8px;padding:8px;margin-top:4px}.tools{background:#fff;border-bottom:1px solid var(--line);padding:12px}.tools h2{font-size:19px;color:var(--green);margin:0 0 8px}.tool-row{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 12px}button{appearance:none;border:0;border-radius:12px;padding:10px 12px;font-size:16px;font-weight:800;background:var(--green);color:#fff}button.secondary{background:var(--green2);color:var(--green-dark);border:1px solid #cfeadd}button.outline{background:#fff;color:var(--green-dark);border:1px solid var(--line)}.dept-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}.dept-list label{background:#f8fbf9;border:1px solid var(--line);border-radius:12px;padding:9px 8px;font-size:15px;font-weight:700}nav{display:flex;gap:8px;overflow:auto;padding:10px 0 0}nav a{white-space:nowrap;text-decoration:none;color:var(--green);background:var(--green2);border:1px solid #cfeadd;border-radius:999px;padding:8px 12px;font-weight:800;font-size:15px}main{padding:14px 12px}section{margin:0 0 20px}details{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;margin-bottom:14px}summary{cursor:pointer;padding:13px 14px;font-size:21px;font-weight:850;color:var(--green-dark);background:#f3fbf7;border-bottom:1px solid var(--line)}.card{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:13px;margin:10px;box-shadow:0 1px 4px rgba(16,24,40,.06)}.card.incomplete{border-color:var(--red);background:var(--red-bg)}.top{display:flex;gap:10px;align-items:flex-start}.no{flex:0 0 auto;min-width:42px;height:42px;border-radius:12px;background:var(--green2);color:var(--green);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px}.item{font-size:19px;font-weight:800;line-height:1.55}.unit{margin-top:10px;color:var(--muted);font-size:16px;font-weight:700}.check{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px}label.choice{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;font-size:18px;font-weight:800}.write{margin-top:10px;display:grid;gap:8px}.write input{border:1px solid var(--line);border-radius:12px;padding:10px;font-size:18px;width:100%;background:#fff}.bottom-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;background:rgba(255,255,255,.94);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:8px;backdrop-filter:blur(8px)}#output{display:none;margin:12px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}#output.show{display:block}#output h2{margin:0 0 8px;color:var(--green);font-size:21px}.report-table{width:100%;border-collapse:collapse;font-size:14px;line-height:1.45}.report-table th,.report-table td{border:1px solid #999;padding:6px;vertical-align:top;word-break:break-word}.report-table th{background:#eef7f2}.report-table tr.incomplete-row td{border:2px solid var(--red);background:#fff1f0}.small{font-size:14px;color:var(--muted);margin-top:6px}@media print{body{background:#fff}header,.tools,.bottom-bar,main{display:none}#output{display:block!important;border:0;margin:0;padding:0}.wrap{max-width:none;padding:0}}
</style>
</head>
<body><div class="wrap"><header><h1>亞洲健康智慧園區－管理中心 防颱措施檢查表</h1><div class="meta"><div class="field">颱風名稱：<input id="typhoonName" type="text" value="颱風巴威"></div><div class="field">檢查日期：<input id="checkDate" type="date" value="2026-07-08"></div></div></header><div class="tools"><h2>檢查部門</h2><div class="tool-row"><button class="secondary" onclick="selectAllDepts(true)">全選部門</button><button class="secondary" onclick="selectAllDepts(false)">清除</button><button class="outline" onclick="openAll(true)">全部展開</button><button class="outline" onclick="openAll(false)">全部收合</button></div><div class="dept-list" id="deptList"></div><nav><a href="#outdoor">戶外</a><a href="#inside-a">一品</a><a href="#inside-b">四季</a><a href="#inside-d">朝陽</a><a href="#inside-c">長春／鳳凰</a></nav></div><main id="cardsArea"></main><section id="output"><h2>輸出表格</h2><div id="reportMeta" class="small"></div><div id="reportContent"></div></section><div class="bottom-bar"><button onclick="makeReport()">輸出表格</button><button class="secondary" onclick="window.print()">列印／PDF</button></div></div>
<script>
const departments=["售後服務中心","環境維護中心","行政部","清潔部","餐飲中心","溫泉部","泳池部","建築管理中心","建築管理部"];
const data=[
["戶外防颱措施","outdoor","1","檢查一品屋頂開放區域排水孔是否暢通？","售後服務中心"],["戶外防颱措施","outdoor","2","檢查四季屋頂開放區域排水孔是否暢通？","售後服務中心"],["戶外防颱措施","outdoor","3","檢查長春屋頂開放區域排水孔是否暢通？","售後服務中心"],["戶外防颱措施","outdoor","4","檢查鳳凰屋頂開放區域排水孔是否暢通？","售後服務中心"],["戶外防颱措施","outdoor","5","檢查朝陽屋頂開放區域排水孔是否暢通？","售後服務中心"],["戶外防颱措施","outdoor","6","檢查露台區域排水落水頭是否暢通？","售後服務中心"],["戶外防颱措施","outdoor","6-1","一品 2 樓餐廳、湯屋外側陽台落水頭","餐飲中心／溫泉部"],["戶外防颱措施","outdoor","6-2","一品 3 樓住戶露台排水落水頭","行政部／清潔部"],["戶外防颱措施","outdoor","6-3","一品 B1F 泳池外牆陽台排水落水頭","泳池部"],["戶外防颱措施","outdoor","6-4","四季 2、5 樓露台排水落水頭","售後服務中心"],["戶外防颱措施","outdoor","6-5","長春 2、3 樓露台排水落水頭","售後服務中心"],["戶外防颱措施","outdoor","7","檢查一品 B1 車道截水溝是否暢通？","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","8","檢查四季 B1 車道截水溝是否暢通？","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","9","檢查朝陽 B1 車道截水溝是否暢通？","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","10","檢查鳳凰 B1 車道截水溝是否暢通？","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","11","檢查各公共區域門窗，包含各樓層安全門是否關妥？","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","12","陽光活力球場二個櫃子、休息區桌椅，放在護理之家梯間，用繩索集中跟柱子綁固定。","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","13","檢查匹克球網、迷你果嶺立桿收整。","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","14","檢查日式庭園景觀椅放倒。","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","15","檢查沉水抽水泵浦、水管是否備妥？","售後服務中心"],["戶外防颱措施","outdoor","16","檢查車道、排風口防水閘門是否已備妥？隨時可安裝？","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","17","四季風呂區撞球桌保護、球具均移到四季室內暫存。","售後服務中心／環境維護中心"],["戶外防颱措施","outdoor","18","檢查園藝花木是否需支架保護，各式懸掛花盆（如餐廳陽台）應即取下收妥。","環境維護中心"],["戶外防颱措施","outdoor","19","檢查園區外圍外側排水溝是否暢通（包括 C、D 區）？","環境維護中心"],["戶外防颱措施","outdoor","20","檢查污廢水排水設備功能是否正常？","建築管理中心"],["戶外防颱措施","outdoor","21","檢查戶外懸掛之招牌、看板是否取下、固定？以免被風吹落傷人！","環境維護中心"],
["一品官邸戶內防颱措施","inside-a","1","檢查陽台、露台排水孔有無雜物堵塞？","行政部／清潔部"],["一品官邸戶內防颱措施","inside-a","2","檢查戶內（含北醫診所）門窗都已確實關閉？","行政部／清潔部"],["一品官邸戶內防颱措施","inside-a","3","檢查廚房水、電、瓦斯是否關閉？","餐飲中心"],["一品官邸戶內防颱措施","inside-a","4","檢查溫泉區水、電設施已妥善管制？","建築管理中心"],["一品官邸戶內防颱措施","inside-a","5","檢查泳池區水、電設施已妥善管制？","建築管理中心"],["一品官邸戶內防颱措施","inside-a","6","檢查發電機自動功能設定，及油料是否充足，以確保備用電源正常。建議發電機啟動後，先行將重要電器設備關閉，以確保停電期間若發生火災時，消防設備仍有充足備用電力可供使用。","建築管理中心"],
["四季官邸戶內防颱措施","inside-b","1","檢查陽台、露台排水孔有無雜物堵塞？","行政部／清潔部"],["四季官邸戶內防颱措施","inside-b","2","檢查戶內門窗都已確實關閉？","行政部／清潔部"],["四季官邸戶內防颱措施","inside-b","3","檢查公區水、電設施已妥善管制？","建築管理中心"],["四季官邸戶內防颱措施","inside-b","4","檢查發電機自動功能設定，及油料是否充足，以確保備用電源正常。建議發電機啟動後，先行將重要電器設備關閉，以確保停電期間若發生火災時，消防設備仍有充足備用電力可供使用。","建築管理中心"],
["朝陽官邸戶內防颱措施","inside-d","1","檢查陽台、露台排水孔有無雜物堵塞？","行政部／清潔部"],["朝陽官邸戶內防颱措施","inside-d","2","檢查戶內（含粥品館）門窗都已確實關閉？","行政部／餐飲中心"],["朝陽官邸戶內防颱措施","inside-d","3","檢查廚房水、電、瓦斯是否關閉？","餐飲中心"],["朝陽官邸戶內防颱措施","inside-d","4","檢查公區水、電設施已妥善管制？","建築管理部"],["朝陽官邸戶內防颱措施","inside-d","6","檢查發電機自動功能設定，及油料是否充足，以確保備用電源正常。建議發電機啟動後，先行將重要電器設備關閉，以確保停電期間若發生火災時，消防設備仍有充足備用電力可供使用。","建築管理中心"],
["長春、鳳凰官邸戶內防颱措施","inside-c","1","檢查陽台、露台排水孔有無雜物堵塞？","行政部／清潔部"],["長春、鳳凰官邸戶內防颱措施","inside-c","2","檢查戶內（含蒸品館、咖啡吧）門窗都已確實關閉？","行政部／餐飲中心"],["長春、鳳凰官邸戶內防颱措施","inside-c","3","檢查廚房水、電、瓦斯是否關閉？","餐飲中心"],["長春、鳳凰官邸戶內防颱措施","inside-c","4","檢查公區水、電設施已妥善管制？","建築管理部"],["長春、鳳凰官邸戶內防颱措施","inside-c","6","檢查發電機自動功能設定，及油料是否充足，以確保備用電源正常。建議發電機啟動後，先行將重要電器設備關閉，以確保停電期間若發生火災時，消防設備仍有充足備用電力可供使用。","建築管理中心"]
];
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function renderCards(){const main=document.getElementById('cardsArea');let groups={};data.forEach(r=>{let k=r[0]+'|'+r[1];(groups[k]||(groups[k]=[])).push(r)});let out='';Object.entries(groups).forEach(([k,rows])=>{const [title,sid]=k.split('|');out+=`<details id="${sid}" open><summary>${esc(title)}</summary>`;rows.forEach(r=>{out+=`<div class="card" data-depts="${esc(r[4])}" data-section="${esc(r[0])}" data-no="${esc(r[2])}" data-item="${esc(r[3])}" data-unit="${esc(r[4])}"><div class="top"><div class="no">${esc(r[2])}</div><div class="item">${esc(r[3])}</div></div><div class="unit">責任單位：${esc(r[4])}</div><div class="check"><label class="choice"><input class="done" type="checkbox"> 已完成</label><label class="choice"><input class="abnormal" type="checkbox"> 異常</label></div><div class="write"><input class="person" type="text" placeholder="檢核人員"><input class="note" type="text" placeholder="備註／處理情形"></div></div>`});out+='</details>'});main.innerHTML=out}
function buildDeptList(){document.getElementById('deptList').innerHTML=departments.map(d=>`<label><input type="checkbox" class="dept" value="${d}" checked onchange="filterCards()"> ${d}</label>`).join('')}
function selectedDepts(){return [...document.querySelectorAll('.dept:checked')].map(x=>x.value)}
function selectAllDepts(v){document.querySelectorAll('.dept').forEach(x=>x.checked=v);filterCards()}
function openAll(v){document.querySelectorAll('details').forEach(x=>x.open=v)}
function filterCards(){const selected=selectedDepts();document.querySelectorAll('.card').forEach(card=>{const t=card.dataset.depts;const show=selected.length===0||selected.some(d=>t.includes(d));card.style.display=show?'':'none'});document.querySelectorAll('details').forEach(d=>{const has=[...d.querySelectorAll('.card')].some(c=>c.style.display!=='none');d.style.display=has?'':'none'})}
function updateRedFrame(){document.querySelectorAll('.card').forEach(card=>{card.classList.toggle('incomplete',!card.querySelector('.done').checked)})}
document.addEventListener('change',e=>{if(e.target.classList.contains('done'))updateRedFrame()});
function makeReport(){updateRedFrame();const cards=[...document.querySelectorAll('.card')].filter(c=>c.style.display!=='none');const name=esc(document.getElementById('typhoonName').value||'');const date=esc(document.getElementById('checkDate').value||'');document.getElementById('reportMeta').innerHTML=`颱風名稱：${name}　檢查日期：${date}`;let h='<table class="report-table"><thead><tr><th>分類</th><th>編號</th><th>檢查事項</th><th>責任單位</th><th>狀態</th><th>檢核人員</th><th>備註</th></tr></thead><tbody>';cards.forEach(card=>{const done=card.querySelector('.done').checked;const abnormal=card.querySelector('.abnormal').checked;const status=done?(abnormal?'已完成／異常':'已完成'):'未完成';h+=`<tr class="${done?'':'incomplete-row'}"><td>${esc(card.dataset.section)}</td><td>${esc(card.dataset.no)}</td><td>${esc(card.dataset.item)}</td><td>${esc(card.dataset.unit)}</td><td>${status}</td><td>${esc(card.querySelector('.person').value||'')}</td><td>${esc(card.querySelector('.note').value||'')}</td></tr>`});h+='</tbody></table>';document.getElementById('reportContent').innerHTML=h;document.getElementById('output').classList.add('show');document.getElementById('output').scrollIntoView({behavior:'smooth'})}
renderCards();buildDeptList();filterCards();updateRedFrame();
</script></body></html>
