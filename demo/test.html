<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上下班 + 水電簡報 + 巡檢</title>

  <style>
  body {
    font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    padding: 12px;
    margin: 0;
    background-color: #f5f5f5;
    color: #222;
    font-size: 18px;
    line-height: 1.4;
  }

  .section {
    background-color: #fff;
    border: 2px solid #cfcfcf;
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    margin-bottom: 16px;
  }

  h2 {
    text-align: center;
    margin: 0 0 12px 0;
    color: #111;
    font-size: 1.4em;
    font-weight: 400;
    border-bottom: 2px solid #e5e5e5;
    padding-bottom: 8px;
  }

  .form-row {
    margin-bottom: 12px;
  }

  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
    flex-wrap: wrap;
  }

  .label-row label,
  .form-row > label {
    font-weight: 400;
    font-size: 1.05em;
    display: block;
    margin-bottom: 4px;
  }

  .time-label {
    font-weight: 400;
    font-size: 0.95em;
    color: #444;
  }

  .time-display {
    margin-left: 4px;
    color: #c62828;
    font-weight: 400;
  }

  textarea.autosize,
  input[type="text"],
  input[type="number"],
  select {
    width: 100%;
    font-size: 1.08em;
    padding: 10px 12px;
    resize: none;
    overflow: hidden;
    min-height: 44px;
    box-sizing: border-box;
    border: 2px solid #bdbdbd;
    border-radius: 8px;
    background: #fff;
    color: #222;
  }

  textarea.autosize {
    line-height: 1.35;
  }

  input[type="checkbox"] {
    transform: scale(1.3);
    margin-right: 4px;
    vertical-align: middle;
  }

  button {
    margin-top: 4px;
    width: 100%;
    padding: 14px 12px;
    font-size: 1.08em;
    font-weight: 400;
    background-color: #007BFF;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.99);
  }

  textarea.result {
    height: 180px;
    margin-top: 12px;
    width: 100%;
    box-sizing: border-box;
    font-size: 1.02em;
    line-height: 1.4;
    border: 2px solid #bdbdbd;
    border-radius: 8px;
    padding: 10px 12px;
    background: #fafafa;
    resize: none;
    overflow: auto;
  }

  #resultWater {
    height: 420px;
  }

  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }

  .btn-group .btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 8px;
    border: 2px solid #aaa;
    background: #f7f7f7;
    color: #333;
    cursor: pointer;
    transition: 0.2s;
    font-size: 1.05em;
    font-weight: 400;
  }

  .btn-group .btn.active {
    background: #007BFF;
    color: #fff;
    border-color: #007BFF;
    box-shadow: 0 0 6px rgba(0, 123, 255, 0.25);
  }

  .btn-group .btn:hover {
    background: #ececec;
  }

  .btn-group .btn.active:hover {
    background: #007BFF;
    color: #fff;
    border-color: #007BFF;
  }

  #date {
    text-align: center;
    font-size: 1.05em;
    font-weight: 400;
    margin: 0 0 12px 0;
    color: #444;
  }

  @media (max-width: 480px) {
    body {
      font-size: 19px;
      padding: 10px;
    }

    .section {
      padding: 12px;
      margin-bottom: 14px;
    }

    h2 {
      font-size: 1.3em;
    }

    textarea.autosize,
    input[type="text"],
    input[type="number"],
    select {
      font-size: 1.1em;
      min-height: 46px;
    }

    button,
    .btn-group .btn {
      font-size: 1.08em;
      padding: 14px 10px;
    }

    #resultWater {
      height: 380px;
    }
  }
</style>

</head>
<body>

<!-- 上下班交接 -->
<div class="section">
  <h2>上下班交接</h2>

  <div class="form-row">
    <label>班別</label>
    <div class="btn-group" id="shiftName">
      <button type="button" data-value="A班" class="btn active">A班</button>
      <button type="button" data-value="B班" class="btn">B班</button>
    </div>
  </div>

  <div class="form-row">
    <label>類型</label>
    <div class="btn-group" id="shiftType">
      <button type="button" data-value="上班" class="btn active">上班</button>
      <button type="button" data-value="下班" class="btn">下班</button>
    </div>
  </div>

  <div class="form-row">
    <label>人員</label>
    <input type="text" id="handoverPerson" placeholder="請輸入姓名">
  </div>

  <div class="form-row">
    <label>交接物品</label>
    <input type="text" id="handoverItem" value="正常">
  </div>

  <div class="form-row">
    <label>交接事項</label>
    <textarea class="autosize" id="handoverNote">正常</textarea>
  </div>

  <div class="form-row">
    <label>補充說明</label>
    <textarea class="autosize" id="handoverExtra"></textarea>
  </div>

  <button onclick="copyShift()">複製交接內容</button>
  <textarea id="resultShift" class="result" readonly></textarea>
</div>

<!-- 水電簡報 -->
<div class="section">
  <h2>水電簡報</h2>
  <div class="form-row">
    <label>水</label>
    <input type="number" inputmode="numeric" id="waterStatus" placeholder="請輸入數值">
  </div>
  <div class="form-row">
    <label>電</label>
    <input type="number" inputmode="numeric" id="powerStatus" placeholder="請輸入數值">
  </div>
  <div class="form-row">
    <label>機房</label>
    <input type="text" id="roomStatus" value="正常">
  </div>
  <button onclick="copyBrief()">複製水電簡報</button>
  <textarea id="resultBrief" class="result" readonly></textarea>
</div>

<!-- 水電巡檢 -->
<div id="section-inspection" class="section">
  <h2>水電管制巡檢</h2>
  <p id="date"></p>
  <div id="form-inspection"></div>
  <button onclick="copyWater()">複製巡檢內容</button>
  <textarea id="resultWater" class="result" readonly></textarea>
</div>

<script>
  const now = new Date();
  const mm = String(now.getMonth() + 1).padStart(2, "0");
  const dd = String(now.getDate()).padStart(2, "0");
  const dateStr = `${mm}/${dd}`;
  document.getElementById("date").textContent = `日期：${dateStr}`;

  const labels = [
    "接待中心", "北醫中午", "北醫休診", "社區廚房", "溫泉區", "娛樂室", "樣品房",
    "3F祈禱室", "4F書畫室", "5F宗教室", "7F棋藝室", "泳池", "足湯"
  ];
  const form = document.getElementById("form-inspection");
  labels.forEach(label => {
    const html = `
      <div class="form-row">
        <div class="label-row">
          <label>${label}</label>
          <label class="time-label">
            <input type="checkbox" class="time-toggle">記錄時間
            <span class="time-display"></span>
          </label>
        </div>
        <textarea class="autosize" data-label="${label}">正常</textarea>
      </div>`;
    form.insertAdjacentHTML('beforeend', html);
  });

  document.addEventListener("input", (e) => {
    if (e.target.classList.contains("autosize")) {
      e.target.style.height = "auto";
      e.target.style.height = e.target.scrollHeight + "px";
    }
  });

  document.addEventListener("change", (e) => {
    if (e.target.classList.contains("time-toggle")) {
      const row = e.target.closest(".form-row");
      const timeSpan = row.querySelector(".time-display");
      if (e.target.checked) {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mi = String(now.getMinutes()).padStart(2, "0");
        timeSpan.textContent = `（${hh}:${mi}）`;
      } else {
        timeSpan.textContent = "";
      }
    }
  });

  /* 點選式按鈕切換 */
  document.querySelectorAll('.btn-group').forEach(group => {
    group.addEventListener('click', e => {
      if (e.target.classList.contains('btn')) {
        group.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
      }
    });
  });

  /* 複製交接內容 */
  function copyShift() {
    const shift = document.querySelector('#shiftName .active').dataset.value;
    const type = document.querySelector('#shiftType .active').dataset.value;
    const person = document.getElementById("handoverPerson").value.trim();
    const item = document.getElementById("handoverItem").value.trim();
    const note = document.getElementById("handoverNote").value.trim();
    const extra = document.getElementById("handoverExtra").value.trim();

    let result = `${shift}${type}`;
    if (person) result += `：${person}`;
    else result += `：`;

    result += `\n交接物品：${item}`;
    result += `\n交接事項：${note}`;
    if (extra) result += `\n${extra}`;

    const box = document.getElementById("resultShift");
    box.value = result;
    box.select();
    document.execCommand("copy");
    alert("交接內容已複製！");
  }

  /* 複製水電簡報 */
  function copyBrief() {
    const w = document.getElementById("waterStatus").value.trim();
    const p = document.getElementById("powerStatus").value.trim();
    const r = document.getElementById("roomStatus").value.trim();
    const result = `水：${w}\n電：${p}\n機房：${r}`;
    const box = document.getElementById("resultBrief");
    box.value = result;
    box.select();
    document.execCommand("copy");
    alert("水電簡報已複製！");
  }

  /* 複製巡檢內容 */
  function copyWater() {
    const rows = document.querySelectorAll("#form-inspection .form-row");
    let result = [`一品、四季(${dateStr})`, "水電管制巡檢"];
    rows.forEach(row => {
      const textarea = row.querySelector("textarea");
      const label = textarea.dataset.label;
      const timeSpan = row.querySelector(".time-display");
      const time = timeSpan?.textContent || "";
      let value = textarea.value.trim();
      if (value === "正常") {
        result.push(`${label}：正常`);
      } else {
        const title = time ? `${label}${time}` : label;
        const content = value.split('\n').map(line => line.trim()).filter(Boolean).join('，');
        result.push(title);
        if (content) result.push(content);
      }
    });
    const output = result.join('\n').trim();
    const box = document.getElementById("resultWater");
    box.value = output;
    box.select();
    document.execCommand("copy");
    alert("巡檢內容已複製！");
  }
</script>
</body>
</html>
