<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>兔兔胡蘿蔔割草戰</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      background: #151427; color: #fff;
      font-family: "Courier New","Microsoft JhengHei",monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }
    body { display: grid; place-items: center; background: radial-gradient(circle,#3d315e,#151427 72%); }
    #wrap {
      position: relative; width: min(100vw,1200px); aspect-ratio: 16/9; max-height: 100vh;
      overflow: hidden; border: 4px solid #fff0b1; background: #74be55;
      box-shadow: 0 0 0 6px #3e315e,0 20px 70px #000b; image-rendering: pixelated;
      touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
    }
    #wrap:fullscreen, #wrap.fullscreenFallback {
      width: 100vw; height: 100dvh; max-width: none; max-height: none;
      aspect-ratio: auto; border: 0; box-shadow: none; background: #151427;
    }
    canvas {
      display: block; width: 100%; height: 100%; image-rendering: pixelated;
      touch-action: none; user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; -webkit-user-drag: none;
    }
    #displayControls {
      position: absolute; right: 10px; bottom: 10px; z-index: 30;
      display: flex; gap: 7px; padding: 6px; border: 2px solid #fff5; border-radius: 12px;
      background: #17142fcc; backdrop-filter: blur(4px);
    }
    #displayControls button {
      min-width: 0; min-height: 38px; margin: 0; padding: 7px 11px;
      border-radius: 7px; font-size: 14px; box-shadow: inset -3px -3px #d99032,3px 3px #0b0920;
    }
    #displayControls button.active { color: #fff; background: #c94e63; box-shadow: inset -3px -3px #793042,3px 3px #0b0920; }
    #displayControls.gameSettings {
      left: 62px; right: auto; bottom: 10px;
    }
    #settingsBtn {
      position: absolute; left: 10px; bottom: 10px; z-index: 29; display: none;
      width: 44px; height: 44px; min-height: 0; margin: 0; padding: 0;
      border: 2px solid #fff8; border-radius: 50%; color: #fff;
      background: #17142fbb; font-size: 24px; line-height: 1;
      box-shadow: 0 3px 10px #0008;
    }
    #settingsBtn:active { transform: scale(.94); }
    #settingsBtn.visible { display: grid; place-items: center; }
    #settingsBtn.active { background: #c94e63dd; }
    #orientationNote {
      position: absolute; left: 50%; top: 12px; z-index: 31; display: none;
      transform: translateX(-50%); padding: 8px 13px; border-radius: 999px;
      color: #fff; background: #17142fe8; font-size: 13px; font-weight: bold;
      pointer-events: none;
    }
    .screen {
      position: absolute; inset: 0; z-index: 10; display: grid; place-items: center;
      padding: 22px; text-align: center; background: #17132ce8;
    }
    .hidden { display: none !important; }
    .panel {
      width: min(720px,94%); padding: 26px; border: 5px solid #fff0aa;
      outline: 5px solid #613f72; background: #231c42f2; box-shadow: 10px 10px 0 #09071899;
    }
    h1 { margin: 0 0 8px; font-size: clamp(28px,5vw,54px); color: #ffe56d; text-shadow: 4px 4px #c44650; }
    h2 { margin: 0 0 16px; color: #a7edff; }
    .help { line-height: 1.7; color: #f6f0db; }
    .menuPanel { width: min(900px,96%); max-height: 94vh; overflow-y: auto; }
    .metaTop {
      display: flex; justify-content: space-between; gap: 12px; align-items: center;
      margin: 14px 0 10px; padding: 10px 14px; background: #17142f; border: 2px solid #79609b;
    }
    #metaPoints { color: #ffe56d; font-size: 21px; font-weight: bold; }
    #metaStats {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; text-align: left;
    }
    .statCard {
      padding: 10px; background: #302652; border: 2px solid #765d96; min-height: 86px;
    }
    .statCard b { color: #9eeaff; display: block; }
    .statCard small { color: #c9bddb; display: block; margin: 4px 0; }
    .statCard button {
      width: 100%; margin: 3px 0 0; padding: 7px 5px; font-size: 14px;
      box-shadow: inset -3px -3px #d99032,3px 3px #0b0920;
    }
    .statCard button:disabled { filter: grayscale(1); opacity: .45; cursor: default; }
    button {
      border: 0; margin-top: 15px; padding: 12px 28px; cursor: pointer;
      color: #271b36; background: #ffdb58; font: bold 19px inherit;
      box-shadow: inset -5px -5px #d99032,5px 5px #0b0920;
    }
    button:active { transform: translate(3px,3px); }
    #levelup { overflow: hidden; }
    #levelup .levelPanel {
      width: min(720px,92%);
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #levelup h1 { width: 100%; margin-bottom: 12px; text-align: center; font-size: clamp(25px,4vw,40px); }
    #choices {
      display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr));
      grid-template-rows: repeat(2,minmax(0,1fr));
      gap: 10px;
      width: 100%;
      height: min(410px,72vh);
      margin: 0 auto;
    }
    .choice {
      min-height: 0; padding: 11px 9px; border: 3px solid #ffe89a;
      background: linear-gradient(#3b2e67,#251d46); cursor: pointer;
      box-shadow: 4px 4px #100c23; display: flex; flex-direction: column; justify-content: center;
    }
    .choice:hover { transform: translateY(-5px); background: linear-gradient(#5a4389,#302357); }
    .choice .icon { font-size: clamp(27px,5vh,38px); }
    .choice b { color: #ffe36d; font-size: clamp(15px,2.6vh,19px); margin: 4px 0; }
    .choice small { color: #c8ddf0; font-size: clamp(11px,1.9vh,14px); line-height: 1.3; }
    #touch {
      position: absolute; left: 0; top: 0; z-index: 6; display: none;
      width: 138px; height: 138px; pointer-events: none; transform: translate(-50%,-50%);
      border: 3px solid #fff9; border-radius: 50%;
      background: radial-gradient(circle,#fff2 0 18%,#25204b99 20% 58%,#fff2 60% 62%,#17142f99 64%);
      box-shadow: 0 5px 18px #0008, inset 0 0 22px #a9eaff33;
    }
    #touchKnob {
      position: absolute; left: 50%; top: 50%; width: 58px; height: 58px;
      transform: translate(-50%,-50%); border: 3px solid #fffbd0; border-radius: 50%;
      background: #d55057dd; box-shadow: 0 4px 10px #0008, inset 0 0 12px #fff5;
    }
    #touchHint {
      position: absolute; left: 50%; bottom: 14px; z-index: 5; display: none;
      transform: translateX(-50%); width: max-content; max-width: 90%;
      padding: 7px 12px; border-radius: 999px; color: #fff;
      background: #17142fbb; font-size: clamp(12px,3.2vw,16px); font-weight: bold;
      pointer-events: none; text-shadow: 1px 2px #000;
    }
    @media(pointer:coarse),(max-width:620px) {
      #wrap { width:100vw; border:0; box-shadow:none; }
      #touch.active { display:block; }
      #touchHint { display:block; }
      .screen { padding: 10px; }
      .panel { padding: 18px; border-width: 3px; outline-width: 3px; }
      button { min-height: 48px; padding: 11px 24px; font-size: 18px; }
      #levelup .levelPanel { width: min(94%,640px); }
      #choices { grid-template-columns:repeat(2,minmax(0,1fr)); height:min(390px,72vh); overflow:visible; }
      .choice { min-height:0; }
      #metaStats { grid-template-columns: repeat(2,1fr); }
      .menuPanel { padding: 16px; }
      #displayControls { right: 8px; bottom: 8px; gap: 5px; padding: 5px; }
      #displayControls.gameSettings { left: 60px; right: auto; }
      #displayControls button { min-height: 42px; padding: 7px 10px; font-size: 13px; }
      #settingsBtn { left: 8px; bottom: 8px; }
    }
    @media(pointer:coarse) and (orientation:portrait) {
      #touch { width: 118px; height: 118px; }
      #touchKnob { width: 52px; height: 52px; }
    }
    body.layout-landscape #wrap:fullscreen canvas,
    body.layout-landscape #wrap.fullscreenFallback canvas {
      position: absolute; left: 50%; top: 50%;
      width: min(100vw,177.78dvh); height: min(100dvh,56.25vw);
      transform: translate(-50%,-50%);
    }
    body.layout-portrait #wrap {
      width: 100vw; height: 100dvh; max-height: none; aspect-ratio: auto;
      border: 0; box-shadow: none; background: linear-gradient(#151427,#292049 48%,#151427);
    }
    body.layout-portrait canvas {
      position: absolute; left: 50%; top: 50%;
      width: min(100vw,56.25dvh); height: min(100dvh,177.78vw);
      aspect-ratio: 9/16; transform: translate(-50%,-50%);
    }
    body.layout-portrait .screen { inset: 0; height: auto; transform: none; }
    body.layout-portrait #displayControls {
      left: 50%; right: auto; top: auto; bottom: max(10px,env(safe-area-inset-bottom));
      transform: translateX(-50%); width: max-content;
    }
    body.layout-portrait #displayControls.gameSettings {
      left: 60px; bottom: max(8px,env(safe-area-inset-bottom)); transform: none;
    }
    body.layout-portrait #settingsBtn { bottom: max(8px,env(safe-area-inset-bottom)); }
    body.layout-portrait #touchHint {
      bottom: max(70px,calc(env(safe-area-inset-bottom) + 60px));
    }
    body.layout-portrait #orientationNote { top: max(10px,env(safe-area-inset-top)); }
    body.layout-portrait .menuPanel {
      width: min(94%,560px); max-height: 92%; padding: 13px;
    }
    body.layout-portrait .menuPanel h1 { font-size: clamp(25px,8vw,42px); }
    body.layout-portrait .menuPanel h2 { margin-bottom: 8px; font-size: clamp(17px,5vw,25px); }
    body.layout-portrait .metaTop { margin: 7px 0; padding: 7px 9px; font-size: 13px; }
    body.layout-portrait #metaPoints { font-size: 16px; }
    body.layout-portrait #metaStats { grid-template-columns: repeat(2,1fr); gap: 6px; }
    body.layout-portrait .statCard { min-height: 70px; padding: 7px; font-size: 12px; }
    body.layout-portrait .help { font-size: 12px; line-height: 1.4; }
    body.layout-portrait #levelup .levelPanel { width: min(92%,500px); }
    body.layout-portrait #choices { height: min(570px,66vh); gap: 8px; }
    body.layout-portrait .choice { padding: 10px 7px; }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="540"></canvas>
  <div id="intro" class="screen">
    <div class="panel menuPanel">
      <h1>兔兔胡蘿蔔割草戰</h1>
      <h2>兔兔能力・永久強化</h2>
      <div class="metaTop">
        <span id="metaRecord">累計擊殺 0</span>
        <span id="metaPoints">強化點數 0</span>
      </div>
      <div id="metaStats"></div>
      <div class="help">
        強化點數：一般敵人每 25 隻 +1・菁英 +3・BOSS +10・擊敗最終魔王 +25<br>
        WASD / 方向鍵移動，胡蘿蔔會自動瞄準最近敵人<br>
        手機可用右下方按鈕選擇全螢幕、橫向或直向<br>
        蒐集發光小蔬菜升級，每次從 4 種能力中選 1 種<br>
        怪潮、菁英、BOSS 與最終魔王正在接近
      </div>
      <button id="start">開始割草</button>
    </div>
  </div>
  <div id="levelup" class="screen hidden">
    <div class="levelPanel">
      <h1>升級！選擇一項</h1>
      <div id="choices"></div>
    </div>
  </div>
  <div id="end" class="screen hidden">
    <div class="panel">
      <h1 id="endTitle">挑戰結束</h1>
      <h2 id="endSub"></h2>
      <div class="help" id="endText"></div>
      <button id="again">返回能力頁</button>
    </div>
  </div>
  <div id="touch"><div id="touchKnob"></div></div>
  <div id="touchHint">按住畫面任意位置拖曳即可移動</div>
  <div id="orientationNote"></div>
  <button id="settingsBtn" type="button" aria-label="顯示設定">⚙</button>
  <div id="displayControls">
    <button id="fullscreenBtn" type="button">全螢幕</button>
    <button id="landscapeBtn" type="button">橫向</button>
    <button id="portraitBtn" type="button">直向</button>
  </div>
</div>
<script>
(() => {
  "use strict";
  const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
  ctx.imageSmoothingEnabled=false;
  let W=960,H=540;
  const DURATION=600,wrap=document.getElementById("wrap");
  const intro=document.getElementById("intro"),levelScreen=document.getElementById("levelup");
  const endScreen=document.getElementById("end"),choicesEl=document.getElementById("choices");
  const metaStatsEl=document.getElementById("metaStats"),metaPointsEl=document.getElementById("metaPoints"),metaRecordEl=document.getElementById("metaRecord");
  const keys={up:false,down:false,left:false,right:false};
  const stick={active:false,pointerId:null,x:0,y:0,startX:0,startY:0};
  let running=false,paused=false,ended=false,last=0,time=0,spawnClock=0,shotClock=0;
  let enemies=[],shots=[],enemyShots=[],gems=[],effects=[],texts=[],areas=[],petShots=[],chests=[],pickups=[];
  let announcements=[],activeAnnouncement=null;
  let kills=0,score=0,eliteKills=0,bossKills=0,nextId=1,levelQueue=0;
  let eligibleKills=0,instantKills=0,instantKillTimer=0;
  let chestClock=0,chestTravel=0,lastChestX=0,lastChestY=0,magnetAll=false;
  let carrotVolley=0;
  let runRewarded=false;
  let escalationStart=null;
  let killSurgeActive=false;
  let finalPhase="none",finalTimer=0;
  let bossArena={active:false,x:0,y:0,r:360};
  let audio=null;

  const META_KEY="bunnyCarrotSurvivorsMetaV1";
  const metaDefs=[
    {id:"damage",name:"攻擊力",cost:5,desc:"+4% 初始攻擊力",value:m=>`+${m.damage*4}%`},
    {id:"crit",name:"爆擊率",cost:8,desc:"+1% 基礎爆擊率",value:m=>`+${m.crit}%`},
    {id:"speed",name:"攻擊速度",cost:7,desc:"+3% 初始攻速",value:m=>`+${m.speed*3}%`},
    {id:"critDamage",name:"爆擊傷害",cost:6,desc:"+5% 爆擊傷害",value:m=>`+${m.critDamage*5}%`},
    {id:"life",name:"生命力",cost:4,desc:"+5% 最大生命",value:m=>`+${m.life*5}%`},
    {id:"regen",name:"回復力",cost:10,desc:"+0.08% 最大生命/秒",value:m=>`+${(m.regen*.08).toFixed(2)}%/秒`}
  ];
  let meta=loadMeta();

  function defaultMeta(){
    return{points:0,totalKills:0,totalElites:0,totalBosses:0,damage:0,crit:0,speed:0,critDamage:0,life:0,regen:0};
  }

  function loadMeta(){
    try{
      const saved=JSON.parse(localStorage.getItem(META_KEY)||"null");
      return Object.assign(defaultMeta(),saved||{});
    }catch(_error){
      return defaultMeta();
    }
  }

  function saveMeta(){
    try{localStorage.setItem(META_KEY,JSON.stringify(meta));}catch(_error){}
  }

  function xpRequirement(level,killCount){
    const normal=18*Math.pow(1.18,level-1)+level*4;
    const earlyScale=.45+.55*Math.min(1,killCount/200);
    return Math.max(8,Math.floor(normal*earlyScale));
  }

  function metaUpgradeCost(def){
    const tier=Math.floor(meta[def.id]/10);
    return Math.ceil(def.cost*(1+tier*.5));
  }

  function renderMeta(){
    metaPointsEl.textContent=`強化點數 ${meta.points}`;
    metaRecordEl.textContent=`累計擊殺 ${meta.totalKills}・菁英 ${meta.totalElites}・BOSS ${meta.totalBosses}`;
    metaStatsEl.innerHTML="";
    for(const def of metaDefs){
      const cost=metaUpgradeCost(def);
      const tier=Math.floor(meta[def.id]/10)+1;
      const card=document.createElement("div");
      card.className="statCard";
      card.innerHTML=`<b>${def.name} LV${meta[def.id]}</b><small>${def.desc}<br>目前 ${def.value(meta)}・強化階級 ${tier}</small>`;
      const button=document.createElement("button");
      button.textContent=`強化 1 點（花費 ${cost}）`;
      button.disabled=meta.points<cost;
      button.onclick=()=>{
        const currentCost=metaUpgradeCost(def);
        if(meta.points<currentCost)return;
        meta.points-=currentCost;
        meta[def.id]++;
        saveMeta();
        renderMeta();
        beep(620,.09,.025);
      };
      card.appendChild(button);
      metaStatsEl.appendChild(card);
    }
  }

  const player={
    x:0,y:0,r:18,speed:210,hp:100,maxHp:100,regen:0,
    level:1,xp:0,nextXp:18,damage:18,attackSpeed:1,projectiles:1,
    crit:0.05,critStack:0.05,critDamage:1.6,pierce:0,magnet:90,area:1,invuln:0,
    facing:1
  };
  const skills={orbit:0,burst:0,peanut:0};
  const upgradeLevels={
    speed:0,heal:0,haste:0,damage:0,crit:0,critd:0,
    pierce:0,magnet:0,vital:0,area:0,multi:0
  };
  const BASIC_UPGRADE_CAP=6;
  const KILL_SURGE_THRESHOLD=500;
  const KILL_SURGE_HP_MULTIPLIER=1.6;
  const KILL_SURGE_WAVE_MULTIPLIER=1.75;

  const upgrades=[
    {id:"speed",icon:"💨",name:"兔兔快跑",desc:"+12% 移動速度",basic:true,apply(){player.speed*=1.12;}},
    {id:"heal",icon:"💚",name:"生命回復",desc:"+0.6% 最大生命/秒（無上限）",unlimited:true,apply(){player.regen+=0.006;}},
    {id:"haste",icon:"⏱",name:"攻擊速度",desc:"+15% 攻擊速度",basic:true,apply(){player.attackSpeed*=1.15;}},
    {id:"damage",icon:"🥕",name:"胡蘿蔔威力",desc:"+18% 攻擊力",basic:true,apply(){player.damage*=1.18;}},
    {id:"crit",icon:"✦",name:"幸運一擊",desc:"+7% 基礎爆擊率",basic:true,apply(){const old=player.crit;player.crit=Math.min(.75,player.crit+.07);player.critStack=Math.min(1,player.critStack+player.crit-old);}},
    {id:"critd",icon:"💥",name:"爆擊強化",desc:"+30% 爆擊傷害",basic:true,apply(){player.critDamage+=.3;}},
    {id:"pierce",icon:"➶",name:"銳利蘿蔔",desc:"+1 穿透敵人數",basic:true,apply(){player.pierce++;}},
    {id:"magnet",icon:"🧺",name:"剪取範圍",desc:"+30% 蔬菜拾取範圍",basic:true,apply(){player.magnet*=1.3;}},
    {id:"multi",icon:"🥕",name:"胡蘿蔔連發",desc:"同時發射 +1；達5根後每3輪投下巨型胡蘿蔔",valid(){return player.projectiles<10;},apply(){player.projectiles++;}},
    {id:"vital",icon:"❤",name:"強健兔兔",desc:"+20% 最大生命並回復",basic:true,apply(){player.maxHp*=1.2;player.hp=Math.min(player.maxHp,player.hp+player.maxHp*.3);}},
    {id:"area",icon:"⭕",name:"範圍性胡蘿蔔",desc:"+18% 武器與技能範圍",basic:true,apply(){player.area*=1.18;}},
    {id:"orbit",icon:"🥕",name:"蘿蔔旋風",desc:"環繞胡蘿蔔傷害敵人；LV5進化高速切割",valid(){return skills.orbit<5;},apply(){skills.orbit++;}},
    {id:"burst",icon:"🌱",name:"菜園爆發",desc:"定時造成範圍傷害；LV5進化巨大衝擊圈",valid(){return skills.burst<5;},apply(){skills.burst++;}},
    {id:"peanut",icon:"🥜",name:"花生跟班",desc:"花生自動丟石頭；LV5進化貫穿滾石",valid(){return skills.peanut<5;},apply(){skills.peanut++;}}
  ];

  const enemyData={
    turtle:{hp:34,speed:48,damage:10,xp:4,r:18,color:"#55a94d"},
    mushroom:{hp:22,speed:68,damage:8,xp:3,r:15,color:"#9b5a3d"},
    bombcloud:{hp:48,speed:42,damage:14,xp:6,r:20,color:"#60667b"},
    plant:{hp:60,speed:34,damage:16,xp:7,r:19,color:"#dd4a45"}
  };

  function initAudio(){if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)();if(audio.state==="suspended")audio.resume();}
  function beep(f,d=.06,v=.025,type="square"){if(!audio)return;const o=audio.createOscillator(),g=audio.createGain(),t=audio.currentTime;o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(g).connect(audio.destination);o.start();o.stop(t+d);}
  const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
  const rand=(a,b)=>a+Math.random()*(b-a);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.ceil(w),Math.ceil(h));}
  function cameraPosition(){return{x:Math.round(player.x),y:Math.round(player.y)};}
  function worldToScreen(x,y){
    const camera=cameraPosition();
    return{x:Math.round(x-camera.x+W/2),y:Math.round(y-camera.y+H/2)};
  }

  function reset(){
    const maxHp=100*(1+meta.life*.05);
    const baseCrit=Math.min(.75,.05+meta.crit*.01);
    Object.assign(player,{
      x:0,y:0,r:18,speed:210,hp:maxHp,maxHp,regen:meta.regen*.0008,

    announcements=[];activeAnnouncement=null;

  function spawnEnemy(type,kind="normal"){
    const angle=Math.random()*Math.PI*2,range=rand(530,700);
    const base=enemyData[type],scale=1+time/600*.9;
    let hp=base.hp*scale,size=base.r,speed=base.speed*(1+time/1200),damage=base.damage*scale,xp=base.xp;
    if(kind==="elite"){hp*=7;size*=1.45;speed*=1.08;damage*=1.8;xp*=8;}
    if(kind==="boss"){hp*=35;size*=2.25;speed*=.82;damage*=2.8;xp*=35;}
    if(kind==="final"){hp=4200;size=58;speed=52;damage=32;xp=250;}
    if(killSurgeActive)hp*=KILL_SURGE_HP_MULTIPLIER;
    enemies.push({id:nextId++,type,kind,x:player.x+Math.cos(angle)*range,y:player.y+Math.sin(angle)*range,r:size,hp,maxHp:hp,speed,damage,xp,hit:0,attack:rand(0,1),shoot:rand(.8,2.2),slow:0,phase:0,bars:kind==="final"?3:1,totalBars:kind==="final"?3:1});
  }

  function spawnWave(count,kind="normal"){
    const types=["turtle","mushroom","bombcloud","plant"];
    const finalCount=Math.ceil(count*(killSurgeActive?KILL_SURGE_WAVE_MULTIPLIER:1));
    for(let i=0;i<finalCount;i++)spawnEnemy(types[Math.floor(Math.random()*types.length)],kind);
    announce(
      kind==="elite"?"菁英怪來襲！":kind==="boss"?"BOSS 出現！":"怪潮來襲！",
      kind==="elite"?"強大的敵人氣息正在接近":kind==="boss"?"準備迎戰巨大敵人":"敵人數量大幅增加",
      kind==="normal"?"#ffe45f":"#ff826b"
    );
    beep(kind==="normal"?180:120,.35,.045,"sawtooth");
  }

  function timeline(){
    const sec=Math.floor(time);
    const escalationReady=eligibleKills>=200||sec>=480;
    if(escalationReady&&escalationStart===null){
      escalationStart=time;
      announce("終盤怪潮啟動！",eligibleKills>=200?"有效擊殺 200 隻，敵軍全面進攻":"第 8 分鐘，敵軍全面進攻","#ffb35c",4);
    }

    if(escalationStart===null){
      if(sec>0&&sec%60===0&&!timeline.seen.has("early-wave"+sec)){timeline.seen.add("early-wave"+sec);spawnWave(12+sec/10);}
      if([120,270,420].includes(sec)&&!timeline.seen.has("early-elite"+sec)){timeline.seen.add("early-elite"+sec);spawnWave(2,"elite");}
      if([180,360].includes(sec)&&!timeline.seen.has("early-boss"+sec)){timeline.seen.add("early-boss"+sec);spawnEnemy(sec===360?"bombcloud":"plant","boss");announce("BOSS 出現！","強敵已進入菜園","#ff775e");}
    }else if(sec<DURATION){
      const elapsed=Math.floor(time-escalationStart);
      const waveSlot=Math.floor(elapsed/30);
      const eliteSlot=Math.floor(elapsed/60);
      const bossSlot=Math.floor(elapsed/120);
      if(waveSlot>0&&!timeline.seen.has("rush-wave"+waveSlot)){timeline.seen.add("rush-wave"+waveSlot);spawnWave(20+Math.floor(time/30));}
      if(eliteSlot>0&&!timeline.seen.has("rush-elite"+eliteSlot)){timeline.seen.add("rush-elite"+eliteSlot);spawnWave(2+Math.floor(time/240),"elite");}
      if(bossSlot>0&&!timeline.seen.has("rush-boss"+bossSlot)){timeline.seen.add("rush-boss"+bossSlot);spawnEnemy(bossSlot%2?"plant":"bombcloud","boss");announce("終盤 BOSS 出現！","高威脅敵人加入戰場","#ff775e");}
    }

    if(sec>=DURATION&&!timeline.seen.has("final")){
      timeline.seen.add("final");
      beginFinalBossEntrance();
    }
  }
  timeline.seen=new Set();

  function nearest(x,y,exclude=new Set()){
    let best=null,bd=Infinity;
    for(const e of enemies){if(e.hp<=0||exclude.has(e.id))continue;const d=(e.x-x)**2+(e.y-y)**2;if(d<bd){bd=d;best=e;}}
    for(const chest of chests){
      if(chest.opened||exclude.has(chest.id))continue;
      const d=(chest.x-x)**2+(chest.y-y)**2;
      if(d<bd){bd=d;best=chest;}
    }
    return best;
  }

  function fireCarrots(){
    if(!enemies.length&&!chests.some(c=>!c.opened))return;
    carrotVolley++;
    const used=new Set();
    for(let i=0;i<player.projectiles;i++){
      let target=nearest(player.x,player.y,used);if(!target){used.clear();target=nearest(player.x,player.y,used);}if(!target)break;
      used.add(target.id);
      const a=Math.atan2(target.y-player.y,target.x-player.x)+rand(-.025,.025);
      shots.push({x:player.x,y:player.y,vx:Math.cos(a)*520,vy:Math.sin(a)*520,r:6*player.area,life:1.8,damage:player.damage,pierce:player.pierce,angle:a});
    }
    if(player.projectiles>=5&&carrotVolley%3===0){
      const target=nearest(player.x,player.y);
      if(target){
        const a=Math.atan2(target.y-player.y,target.x-player.x);
        shots.push({
          kind:"giant",x:player.x,y:player.y,vx:Math.cos(a)*330,vy:Math.sin(a)*330,
          r:18*player.area,life:2.2,damage:player.damage*3.2,pierce:0,angle:a
        });
        beep(170,.14,.035,"sawtooth");
      }
    }
    beep(360,.035,.012);
  }

  function firePet(){
    const target=nearest(player.x,player.y);if(!target)return;
    const a=Math.atan2(target.y-player.y,target.x-player.x);
    const evolved=skills.peanut>=5;
    petShots.push({
      kind:evolved?"rolling":"stone",x:player.x-28,y:player.y+22,
      vx:Math.cos(a)*(evolved?300:390),vy:Math.sin(a)*(evolved?300:390),
      r:evolved?15:6,life:evolved?3.4:2,damage:evolved?58:9+skills.peanut*8,
      hit:new Set(),debris:0
    });
  }

  function damageEnemy(e,amount,critical=false,source="normal"){
    e.hp-=amount;e.hit=.1;
    text(e.x,e.y-e.r,Math.round(amount)+(critical?"!":""),critical?"#ffe45f":"#fff",critical?19:14,critical?"critical":"normal");
    if(e.kind==="final"&&e.hp<=0&&e.bars>1){
      e.bars--;
      e.hp=e.maxHp;
      e.speed*=1.12;
      e.damage*=1.18;
      e.phase=0;
      burst(e.x,e.y,"#ff5269",32);
      effects.push({kind:"shockwave",x:e.x,y:e.y,r:20,max:180,life:.65});
      announce(`關卡 BOSS 剩餘 ${e.bars} 條血！`,"攻擊速度與威力提升","#ff5c72",4);
      beep(95,.55,.06,"sawtooth");
      return;
    }
    if(e.hp<=0)killEnemy(e,source);
  }

  function killEnemy(e,source="normal"){
    if(e.dead)return;e.dead=true;kills++;score+=e.kind==="normal"?10:e.kind==="elite"?150:500;
    if(source!=="chestBomb"){
      eligibleKills++;
      instantKills++;
      instantKillTimer=1.25;
    }
    if(!killSurgeActive&&eligibleKills>=KILL_SURGE_THRESHOLD){
      killSurgeActive=true;
      announce("500 有效擊殺：狂暴怪潮！","寶箱炸彈不計；往後怪潮 +75%・生命 +60%","#ff596f",5);
      beep(72,.75,.065,"sawtooth");
    }
    if(e.kind==="elite")eliteKills++;if(e.kind==="boss"||e.kind==="final")bossKills++;
    const count=e.kind==="normal"?1:e.kind==="elite"?5:e.kind==="boss"?12:25;
    for(let i=0;i<count;i++)gems.push({id:nextId++,x:e.x+rand(-e.r,e.r),y:e.y+rand(-e.r,e.r),value:e.xp/count,type:Math.floor(Math.random()*5),r:9,phase:Math.random()*6.28});
    burst(e.x,e.y,e.kind==="normal"?"#ffe174":"#ff6b68",e.kind==="normal"?5:18);
    if(source==="orbit"&&skills.orbit>=5){
      effects.push(
        {kind:"half",x:e.x-e.r*.25,y:e.y,vx:-90,vy:-70,life:.55,r:e.r,color:enemyData[e.type].color,side:-1},
        {kind:"half",x:e.x+e.r*.25,y:e.y,vx:90,vy:-70,life:.55,r:e.r,color:enemyData[e.type].color,side:1}
      );
      effects.push({kind:"slash",x:e.x,y:e.y,life:.22,r:e.r*1.8});
      beep(820,.06,.025,"sawtooth");
    }
    beep(e.kind==="normal"?140:90,.08,.02);
    if(e.kind==="final")win();
  }

  function gainXp(v){
    player.xp+=v;
    while(player.xp>=player.nextXp){
      player.xp-=player.nextXp;
      player.level++;
      player.nextXp=xpRequirement(player.level,kills);
      levelQueue++;
    }
    if(levelQueue&&!paused)showLevelUp();
  }

  function showLevelUp(){
    paused=true;levelScreen.classList.remove("hidden");choicesEl.innerHTML="";
    const pool=upgrades.filter(u=>{
      if(u.basic&&upgradeLevels[u.id]>=BASIC_UPGRADE_CAP)return false;
      return !u.valid||u.valid();
    }),picked=[];
    while(picked.length<4&&pool.length){const i=Math.floor(Math.random()*pool.length);picked.push(pool.splice(i,1)[0]);}
    for(const u of picked){
      const card=document.createElement("div");card.className="choice";
      let current="";
      if(["orbit","burst","peanut"].includes(u.id))current=`目前 LV${skills[u.id]}/5`;
      else if(u.id==="multi")current=`目前 ${player.projectiles}/10 根`;
      else if(u.unlimited)current=`目前強化 ${upgradeLevels[u.id]} 次・無上限`;
      else if(u.basic)current=`目前 LV${upgradeLevels[u.id]}/${BASIC_UPGRADE_CAP}`;
      card.innerHTML=`<span class="icon">${u.icon}</span><b>${u.name}</b><small>${u.desc}<br>${current}</small>`;
      card.onclick=()=>{u.apply();if(Object.hasOwn(upgradeLevels,u.id))upgradeLevels[u.id]++;levelQueue--;levelScreen.classList.add("hidden");paused=false;beep(660,.1,.04);if(levelQueue)setTimeout(showLevelUp,80);};
      choicesEl.appendChild(card);
    }
  }

  function spawnChest(){
    const angle=Math.random()*Math.PI*2,distance=rand(360,620);
    chests.push({
      id:nextId++,
      x:player.x+Math.cos(angle)*distance,
      y:player.y+Math.sin(angle)*distance,
      r:22,
      phase:Math.random()*6.28,
      opened:false,
      reward:null,
      rewardLife:0,
      hintLife:10
    });
    text(player.x,player.y-90,"附近出現了寶箱！","#ffe16c",22);
    beep(520,.12,.025);

  function openChest(chest){
    if(chest.opened)return;
    chest.opened=true;
    const rewards=["magnet","bomb","heal"];
    chest.reward=rewards[Math.floor(Math.random()*rewards.length)];
    chest.rewardLife=.55;
    burst(chest.x,chest.y,"#ffe273",18);
    pickups.push({id:nextId++,type:chest.reward,x:chest.x,y:chest.y-12,r:18,phase:Math.random()*6.28,life:10});
    const rewardColor=chest.reward==="magnet"?"#78efff":chest.reward==="heal"?"#84ff91":"#ff9a55";
    text(chest.x,chest.y-35,"寶物掉落，10 秒內碰觸拾取！",rewardColor,19);
    beep(520,.22,.035,"triangle");
  }

  function applyChestPickup(pickup){
    if(pickup.type==="magnet"){
      magnetAll=true;
      text(player.x,player.y-42,"強力磁鐵：吸取全部經驗！","#78efff",24);
      beep(760,.35,.04,"triangle");
      return;
    }
    if(pickup.type==="heal"){
      player.hp=player.maxHp;
      text(player.x,player.y-42,"生命完全恢復！","#8cff9b",24);
      burst(player.x,player.y,"#8cff9b",18);
      beep(620,.4,.04,"sine");
      return;
    }
    text(player.x,player.y-42,"畫面炸彈！","#ff9a55",24);
    beep(105,.5,.055,"sawtooth");
    for(const e of enemies){
      if(e.dead)continue;
      const p=worldToScreen(e.x,e.y);
      if(p.x<-e.r||p.x>W+e.r||p.y<-e.r||p.y>H+e.r)continue;
      if(e.kind==="boss"||e.kind==="final")damageEnemy(e,e.maxHp*.2,true,"chestBomb");
      else damageEnemy(e,e.hp+1,true,"chestBomb");
    }
    effects.push({kind:"flash",life:.35});
  }

  function updatePickups(dt){
    for(const pickup of pickups){
      pickup.life-=dt;
      if(dist(pickup,player)<pickup.r+player.r){
        pickup.dead=true;
        applyChestPickup(pickup);
      }else if(pickup.life<=0){
        pickup.dead=true;
        chestClock=Math.min(chestClock,2);
      }
    }
    pickups=pickups.filter(p=>!p.dead);
  }

  function updateChests(dt,moved){
    const unopened=chests.filter(c=>!c.opened).length;
    const activeTreasures=unopened+pickups.length;
    if(activeTreasures<5&&finalPhase==="none")chestClock-=dt;
    chestTravel+=moved;
    if((chestClock<=0||chestTravel>=1800)&&activeTreasures<5&&finalPhase==="none"){
      spawnChest();
      chestClock=rand(65,95);
      chestTravel=0;
    }
    for(const chest of chests){
      if(chest.opened)chest.rewardLife-=dt;
      else chest.hintLife=Math.max(0,chest.hintLife-dt);
    }
    chests=chests.filter(c=>!c.opened||c.rewardLife>0);
  }

  function hurt(amount){
    if(player.invuln>0)return;player.hp-=amount;player.invuln=.7;beep(130,.18,.045,"sawtooth");burst(player.x,player.y,"#ff776e",8);if(player.hp<=0)lose();
  }

  function giantCarrotImpact(shot){
    if(shot.impacted)return;
    shot.impacted=true;
    shot.life=0;
    const radius=105*player.area;
    effects.push(
      {kind:"crater",x:shot.x,y:shot.y,r:radius*.48,life:7},
      {kind:"shockwave",x:shot.x,y:shot.y,r:15,max:radius,life:.45}
    );
    burst(shot.x,shot.y,"#8a5b36",24);
    for(const e of enemies){
      if(!e.dead&&dist(shot,e)<radius+e.r)damageEnemy(e,shot.damage,false,"giant");
    }
    for(const chest of chests){
      if(!chest.opened&&dist(shot,chest)<radius)openChest(chest);
    }
    beep(75,.32,.06,"sawtooth");
  }

  function updatePlayer(dt){
    let dx=(keys.right?1:0)-(keys.left?1:0),dy=(keys.down?1:0)-(keys.up?1:0);
    if(stick.active){dx=stick.x;dy=stick.y;}
    let moved=0;
    if(dx||dy){
      const l=Math.hypot(dx,dy),strength=Math.min(1,l);
      dx/=l;dy/=l;
      moved=player.speed*dt*strength;
      player.x+=dx*moved;player.y+=dy*moved;
      if(dx)player.facing=Math.sign(dx);
    }
    if(bossArena.active){
      const ax=player.x-bossArena.x,ay=player.y-bossArena.y,d=Math.hypot(ax,ay),limit=bossArena.r-player.r-18;
      if(d>limit){player.x=bossArena.x+ax/d*limit;player.y=bossArena.y+ay/d*limit;}
    }
    updateChests(dt,moved);
    if(player.regen)player.hp=Math.min(player.maxHp,player.hp+player.maxHp*player.regen*dt);
    player.invuln=Math.max(0,player.invuln-dt);
    shotClock-=dt;if(shotClock<=0){shotClock=.72/player.attackSpeed;fireCarrots();}
    if(skills.peanut){updatePlayer.pet=(updatePlayer.pet||0)-dt;if(updatePlayer.pet<=0){updatePlayer.pet=Math.max(.35,1.3-skills.peanut*.16);firePet();}}
    if(skills.burst){
      updatePlayer.burst=(updatePlayer.burst||0)-dt;
      if(updatePlayer.burst<=0){
        const evolved=skills.burst>=5;
        updatePlayer.burst=evolved?2.4:Math.max(3.2,5.8-skills.burst*.42);
        const maxRadius=evolved?220*player.area:(120+skills.burst*14)*player.area;
        const waveDamage=evolved?38:10+skills.burst*7;
        for(let wave=0;wave<6;wave++){
          areas.push({
            x:player.x,y:player.y,r:8,max:maxRadius,
            life:1.05,delay:wave*.16,damage:waveDamage,
            hit:new Set(),evolved,wave,started:false
          });
        }
      }
    }
  }

  function updateEnemies(dt){
    for(const e of enemies){
      if(e.dead)continue;e.hit=Math.max(0,e.hit-dt);e.attack-=dt;e.shoot-=dt;e.slow=Math.max(0,e.slow-dt);
      let a=Math.atan2(player.y-e.y,player.x-e.x),speed=e.speed;
      if(e.type==="bombcloud")a+=Math.sin(time*2+e.id)*.5;
      for(const crater of effects){
        if(crater.kind==="crater"&&dist(e,crater)<crater.r+e.r*.35){
          e.slow=Math.max(e.slow,1.25);
          break;
        }
      }
      if(e.slow>0)speed*=.48;
      e.x+=Math.cos(a)*speed*dt;e.y+=Math.sin(a)*speed*dt;
      const ranged=e.type==="plant";
      if(ranged&&e.shoot<=0&&dist(e,player)<650){
        const shotSpeed=e.kind==="normal"?185:e.kind==="elite"?225:250;
        enemyShots.push({x:e.x,y:e.y,vx:Math.cos(a)*shotSpeed,vy:Math.sin(a)*shotSpeed,r:e.kind==="normal"?7:10,damage:e.damage*.55,life:4});
        e.shoot=e.kind==="normal"?rand(2.1,3.2):e.kind==="elite"?rand(1.3,2):rand(.8,1.35);
      }
      if(e.kind==="final"&&e.type==="plant"){
        e.phase-=dt;if(e.phase<=0){e.phase=2.2;for(let i=0;i<8;i++){const q=i*Math.PI/4;enemyShots.push({x:e.x,y:e.y,vx:Math.cos(q)*150,vy:Math.sin(q)*150,life:4,r:12,damage:12});}}
      }
      if(dist(e,player)<e.r+player.r&&e.attack<=0){e.attack=.8;hurt(e.damage);}
    }
    enemies=enemies.filter(e=>!e.dead&&dist(e,player)<1500);
  }

  function updateEnemyShots(dt){
    const orbitCount=skills.orbit?skills.orbit+1:0;
    const orbitRadius=55*player.area;
    const orbitSpeed=skills.orbit>=5?4.6:1.8+skills.orbit*.1;
    for(const shot of enemyShots){
      shot.x+=shot.vx*dt;shot.y+=shot.vy*dt;shot.life-=dt;
      if(orbitCount){
        for(let i=0;i<orbitCount;i++){
          const a=time*orbitSpeed+i*Math.PI*2/orbitCount;
          const guard={x:player.x+Math.cos(a)*orbitRadius,y:player.y+Math.sin(a)*orbitRadius};
          if(dist(shot,guard)<shot.r+12){
            shot.life=0;
            burst(shot.x,shot.y,"#ffb14e",5);
            beep(920,.045,.012,"square");
            break;
          }
        }
      }
      if(shot.life>0&&dist(shot,player)<shot.r+player.r){
        shot.life=0;
        hurt(shot.damage);
      }
    }
    enemyShots=enemyShots.filter(s=>s.life>0&&dist(s,player)<1100);
  }

  function shatterRollingStone(shot,enemy){
    shot.life=0;
    burst(enemy.x,enemy.y,"#aa9278",12);
    effects.push({kind:"shockwave",x:enemy.x,y:enemy.y,r:8,max:48,life:.3});
    for(let i=0;i<7;i++){
      const a=i*Math.PI*2/7+rand(-.2,.2),speed=rand(70,145);
      effects.push({
        kind:"rockFragment",x:enemy.x,y:enemy.y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,

  function updateShots(dt,list,isPet=false){
    for(const s of list){
      s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt;

      if(s.kind==="rolling"){
        s.debris-=dt;
        if(s.debris<=0){
          s.debris=.055;
          effects.push({kind:"chip",x:s.x+rand(-8,8),y:s.y+rand(-8,8),vx:rand(-70,70),vy:rand(-95,-25),life:.35,r:rand(2,5),color:"#8a735e"});
        }
      }

      if(s.kind==="giant"){
        let impact=s.life<=0;
        for(const e of enemies){
          if(!e.dead&&dist(s,e)<=s.r+e.r){impact=true;break;}
        }
        if(impact)giantCarrotImpact(s);
        if(s.life<=0)continue;
      }

      for(const e of enemies){
        if(e.dead||s.life<=0||dist(s,e)>s.r+e.r)continue;
        if(s.kind==="rolling"&&s.hit.has(e.id))continue;
        let crit=false;
        if(!isPet){
          crit=Math.random()<player.critStack;
          player.critStack=crit?player.crit:Math.min(1,player.critStack+player.crit);
        }
        const damage=s.damage*(crit?player.critDamage:1);
        damageEnemy(e,damage,crit,s.kind||"normal");
        if(s.kind==="rolling"){
          s.hit.add(e.id);
          shatterRollingStone(s,e);
          break;
        }
        if(isPet||s.pierce--<=0)s.life=0;else{s.x+=s.vx*dt*2;s.y+=s.vy*dt*2;}
        break;
      }
      if(s.life>0){
        for(const chest of chests){
          if(chest.opened||dist(s,chest)>s.r+chest.r)continue;
          openChest(chest);
          s.life=0;
          break;
        }
      }
    }
    return list.filter(s=>s.life>0);
  }

  function updateSkills(dt){
    if(skills.orbit){
      const count=skills.orbit+1,rad=55*player.area;
      const orbitSpeed=skills.orbit>=5?4.6:1.8+skills.orbit*.1;
      const hitDelay=skills.orbit>=5?.22:.45;
      for(let i=0;i<count;i++){
        const a=time*orbitSpeed+i*Math.PI*2/count,x=player.x+Math.cos(a)*rad,y=player.y+Math.sin(a)*rad;
        for(const e of enemies)if(!e.dead&&dist({x,y},e)<e.r+9&&(!e.orbitHit||time-e.orbitHit>hitDelay)){e.orbitHit=time;damageEnemy(e,skills.orbit>=5?46:8+skills.orbit*5,false,"orbit");}
      }
    }
    for(const a of areas){
      if(a.delay>0){a.delay-=dt;continue;}
      if(!a.started){
        a.started=true;
        beep(a.wave%2===0?760:260,.11,a.evolved?.035:.025,a.wave%2===0?"square":"triangle");
      }
      a.life-=dt;
      a.r+=(a.max-a.r)*dt*(a.evolved?4.2:3.5);
      const band=Math.max(24,a.max*.16);
      for(const e of enemies){
        if(e.dead||a.hit.has(e.id))continue;
        const d=dist(a,e);
        if(d<=a.r+e.r&&d>=Math.max(0,a.r-band-e.r)){
          a.hit.add(e.id);
          damageEnemy(e,a.damage,false,"burst");
        }
      }
    }
    areas=areas.filter(a=>a.delay>0||a.life>0);
  }

  function updateGems(dt){
    for(const g of gems){
      const d=dist(g,player);
      if(magnetAll||d<player.magnet){const a=Math.atan2(player.y-g.y,player.x-g.x),sp=magnetAll?650:180+(player.magnet-d)*4;g.x+=Math.cos(a)*sp*dt;g.y+=Math.sin(a)*sp*dt;}
      if(d<player.r+9){g.dead=true;gainXp(g.value);beep(760,.025,.007);}
    }
    gems=gems.filter(g=>!g.dead&&(magnetAll||dist(g,player)<1300));

  function update(dt){
    if(!running||paused||ended)return;

      finalTimer-=dt;

    if(finalPhase==="none"&&time<DURATION&&spawnClock<=0){spawnClock=Math.max(.12,.7/intensity);const types=time<60?["turtle","mushroom"]:time<240?["turtle","mushroom","bombcloud"]:["turtle","mushroom","bombcloud","plant"];for(let i=0;i<Math.min(4,Math.ceil(intensity/2));i++)spawnEnemy(types[Math.floor(Math.random()*types.length)]);}
    updatePlayer(dt);updateEnemies(dt);shots=updateShots(dt,shots);petShots=updateShots(dt,petShots,true);updateSkills(dt);updateEnemyShots(dt);updateGems(dt);updatePickups(dt);
    for(const e of effects){
      if(e.kind==="particle"||e.kind==="chip"||e.kind==="half"){
        e.x+=e.vx*dt;e.y+=e.vy*dt;e.life-=dt;

      }
      if(e.kind==="crater"||e.kind==="shockwave"||e.kind==="slash")e.life-=dt;
      if(e.kind==="shockwave")e.r+=(e.max-e.r)*dt*11;
      if(e.kind==="flash")e.life-=dt;
      if(e.kind==="rockFragment"){
        e.x+=e.vx*dt;e.y+=e.vy*dt;e.z+=e.vz*dt;e.vz-=480*dt;e.life-=dt;
        if(e.z<=0&&e.vz<0){

          burst(e.x,e.y,"#806d5d",5);
          for(const enemy of enemies)if(!enemy.dead&&dist(e,enemy)<34+enemy.r)damageEnemy(enemy,e.damage,false,"rockFragment");
        }
      }
    }
    effects=effects.filter(e=>e.life===undefined||e.life>0);
    for(const t of texts){t.y-=30*dt;t.life-=dt;}texts=texts.filter(t=>t.life>0);
    if(instantKillTimer>0){

      if(instantKillTimer<=0)instantKills=0;
    }
  }

  function drawFlower(x,y,size,alpha){
    ctx.globalAlpha=alpha;

    for(let i=0;i<6;i++){

      ctx.beginPath();
      ctx.arc(x+Math.cos(a)*size*.62,y+Math.sin(a)*size*.62,size*.48,0,Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle="#ffd83d";
    ctx.beginPath();ctx.arc(x,y,size*.46,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff19a";
    ctx.beginPath();ctx.arc(x-size*.12,y-size*.12,size*.15,0,Math.PI*2);ctx.fill();

  }

        const a=time*speed+i*Math.PI*2/n,x=player.x+Math.cos(a)*r,y=player.y+Math.sin(a)*r;
        drawCarrot({x,y,vx:Math.cos(a),vy:Math.sin(a),angle:a});

  function awardRun(success){
    if(runRewarded)return 0;
    runRewarded=true;
    const normalKills=Math.max(0,kills-eliteKills-bossKills);
    const earned=Math.floor(normalKills/25)+eliteKills*3+bossKills*10+(success?25:0);
    meta.points+=earned;
    meta.totalKills+=kills;
    meta.totalElites+=eliteKills;
    meta.totalBosses+=bossKills;
    saveMeta();
    return earned;
  }

  function win(){
    if(ended)return;

    settingsBtn.classList.remove("visible","active");displayControls.classList.add("hidden");

    endScreen.classList.remove("hidden");

  const orientationNote=document.getElementById("orientationNote"),displayControls=document.getElementById("displayControls"),settingsBtn=document.getElementById("settingsBtn");
  let noteTimer=0,layoutMode="landscape";
  function enterGameDisplayMode(){

  function fullscreenElement(){return document.fullscreenElement||document.webkitFullscreenElement;}
  async function enterFullscreen(){
    if(fullscreenElement())return true;
    try{
      if(wrap.requestFullscreen)await wrap.requestFullscreen();
      else if(wrap.webkitRequestFullscreen)wrap.webkitRequestFullscreen();
      else{showOrientationNote("此瀏覽器不支援網頁全螢幕，可將網頁加入主畫面");return false;}
      return true;
    }catch(_error){
      showOrientationNote("瀏覽器未允許全螢幕，請再按一次全螢幕按鈕");

    }
  }
  async function toggleFullscreen(){
    if(fullscreenElement()){
      if(document.exitFullscreen)await document.exitFullscreen();
      else if(document.webkitExitFullscreen)document.webkitExitFullscreen();
      closeGameSettings();
      return;
    }

  function setLayout(mode){

  async function chooseOrientation(mode){

  function resetStick(){
    stick.active=false;stick.pointerId=null;stick.x=stick.y=0;
    touch.classList.remove("active");
    touchKnob.style.transform="translate(-50%,-50%)";
  }
  function moveStick(e){
    const canvasRect=canvas.getBoundingClientRect();
    const wrapRect=wrap.getBoundingClientRect();
    const radius=Math.max(38,Math.min(56,(touch.offsetWidth||138)*.34));
    let dx=e.clientX-stick.startX,dy=e.clientY-stick.startY;
    const distance=Math.hypot(dx,dy);
    if(distance>radius){dx=dx/distance*radius;dy=dy/distance*radius;}
    stick.x=dx/radius;stick.y=dy/radius;
    touchKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    const visualRadius=(touch.offsetWidth||138)/2+5;
    const centerX=clamp(stick.startX,canvasRect.left+visualRadius,canvasRect.right-visualRadius);
    const centerY=clamp(stick.startY,canvasRect.top+visualRadius,canvasRect.bottom-visualRadius);
    touch.style.left=`${centerX-wrapRect.left}px`;
    touch.style.top=`${centerY-wrapRect.top}px`;
  }
  canvas.addEventListener("pointerdown",e=>{
    if(e.pointerType==="mouse"||!running||paused||ended)return;
    e.preventDefault();
    stick.active=true;stick.pointerId=e.pointerId;stick.startX=e.clientX;stick.startY=e.clientY;
    canvas.setPointerCapture(e.pointerId);
    touch.classList.add("active");
    touchHint.style.display="none";
    moveStick(e);
  });
  canvas.addEventListener("pointermove",e=>{
    if(stick.active&&e.pointerId===stick.pointerId){e.preventDefault();moveStick(e);}
  });
  canvas.addEventListener("pointerup",e=>{if(e.pointerId===stick.pointerId)resetStick();});
  canvas.addEventListener("pointercancel",e=>{if(e.pointerId===stick.pointerId)resetStick();});
  for(const eventName of ["selectstart","dragstart","contextmenu"]){
    wrap.addEventListener(eventName,e=>{
      if(running||eventName!=="contextmenu")e.preventDefault();
    });
  }
  wrap.addEventListener("touchmove",e=>{if(running)e.preventDefault();},{passive:false});
  const keyMap={ArrowUp:"up",KeyW:"up",ArrowDown:"down",KeyS:"down",ArrowLeft:"left",KeyA:"left",ArrowRight:"right",KeyD:"right"};
  addEventListener("keydown",e=>{if(keyMap[e.code]){e.preventDefault();setKey(keyMap[e.code],true);}});
  addEventListener("keyup",e=>{if(keyMap[e.code]){e.preventDefault();setKey(keyMap[e.code],false);}});
  addEventListener("blur",()=>{Object.keys(keys).forEach(k=>keys[k]=false);resetStick();});
  fullscreenBtn.addEventListener("click",toggleFullscreen);
  landscapeBtn.addEventListener("click",()=>chooseOrientation("landscape"));
  portraitBtn.addEventListener("click",()=>chooseOrientation("portrait"));
  settingsBtn.addEventListener("click",toggleGameSettings);
  document.addEventListener("fullscreenchange",updateFullscreenButton);
  document.addEventListener("webkitfullscreenchange",updateFullscreenButton);
  document.getElementById("start").onclick=()=>{timeline.seen.clear();start();};
  document.getElementById("again").onclick=()=>{
    endScreen.classList.add("hidden");
    intro.classList.remove("hidden");
    enterMenuDisplayMode();
    renderMeta();
  };
  let savedLayout="";
  try{savedLayout=localStorage.getItem("bunnyDisplayLayout")||"";}catch(_error){}
  setLayout(savedLayout||((innerHeight>innerWidth&&matchMedia("(pointer:coarse)").matches)?"portrait":"landscape"));
  renderMeta();draw();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
